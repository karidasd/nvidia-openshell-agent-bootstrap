name: Publish to Substack
on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Convert Markdown to HTML
        id: md2html
        run: |
          npm install -g markdown-to-html
          if [ -f "substack_draft.md" ]; then
            echo "Draft file found, publishing substack_draft.md"
            markdown-to-html substack_draft.md index.html
          else
            echo "No draft found, falling back to publishing README.md"
            markdown-to-html README.md index.html
          fi

      - name: Send Email to Substack
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "New local AI workstation update: NVIDIA DGX Spark & OpenShell!"
          body: file://index.html
          to: ${{ secrets.SUBSTACK_PUBLISH_EMAIL }}
          from: ${{ secrets.EMAIL_SENDER }}
          content_type: text/html
